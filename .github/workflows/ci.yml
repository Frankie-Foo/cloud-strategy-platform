name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Test
        run: python -m pytest -q
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy cloud_strategy_platform scripts tests
